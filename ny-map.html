<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纽约地图找房</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin:0; padding:0; height:100%; overflow:hidden; }
        #map { width:100%; height:100vh; }
        .title {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: white; padding: 10px 15px; border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3); font-size: 18px; font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="title">🗺️ 纽约地图找房 - 点击标记查看详情</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([40.7128, -74.0060], 12);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap 贡献者'
        }).addTo(map);

        const houses = [
            {
                lat: 40.7128,
                lng: -74.0060,
                title: "曼哈顿公寓",
                content: "价格: $6000/月<br>2室1厅<br><a href='https://你的详情链接' target='_blank'>查看详情</a>"
            },
            {
                lat: 40.7306,
                lng: -73.9352,
                title: "布鲁克林 Loft",
                content: "价格: $3800/月<br>1室1厅<br><a href='https://你的详情链接' target='_blank'>查看详情</a>"
            }
        ];

        houses.forEach(house => {
            const marker = L.marker([house.lat, house.lng]).addTo(map);
            marker.bindPopup(`<b>${house.title}</b><br>${house.content}`);
        });
    </script>
</body>
</html>
